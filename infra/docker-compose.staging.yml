services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creatordna
      POSTGRES_PASSWORD: creatordna
      POSTGRES_DB: creatordna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatordna -d creatordna"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/creator-dna &&
      exit 0
      "

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+psycopg://creatordna:creatordna@postgres:5432/creatordna
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+psycopg://creatordna:creatordna@postgres:5432/creatordna
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  beat:
    build:
      context: ..
      dockerfile: infra/Dockerfile.beat
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+psycopg://creatordna:creatordna@postgres:5432/creatordna
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
